name: inventory
version: 0.6.0
description: Convert a hand-authored asset-inventory manifest (external drives + hardware/RPis/IoT) to searchable markdown with typed inventory entities
license: MIT

conformance:
  config:
    manifest: tests/fixtures/inventory.yaml

creates_dirs:
  - inventory

config:
  manifest:
    required: true
    description: Path to the hand-authored YAML inventory manifest (top-level `drives:` and `devices:` lists). Relative paths resolve against the store root.

---
name: inventory-finddump
version: 0.6.0
description: Sweep configured drive content-roots (fd/pathspec scan+ignore adapter) into searchable per-drive find-dump markdown shards
license: MIT
module: finddump

creates_dirs:
  - inventory/find-dump

config:
  drives:
    required: true
    description: "List of drives to sweep: each entry is either {id, roots: [<mounted path>, ...]} (explicit mount paths) or {id, mount: {uuid?, label?}, content_roots: [<relpath>...]} (automatic online-drive detection by filesystem UUID/label -- content_roots resolve relative to the detected mountpoint; omit to sweep the whole mountpoint). A drive that isn't currently online (path absent, or no mount matches uuid/label) is skipped gracefully; it never raises."
